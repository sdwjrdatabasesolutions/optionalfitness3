<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>S.U.D - Complete SQL Basics Course | Interactive Learning Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Courier New', monospace;
            background: #0f172a;
            min-height: 100vh;
            color: #e2e8f0;
        }

        /* Main Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            border-bottom: 2px solid #fbbf24;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .logo span {
            color: #fbbf24;
            font-size: 0.8rem;
        }

        .progress-stats {
            display: flex;
            gap: 1.5rem;
            background: #0f172a;
            padding: 0.5rem 1rem;
            border-radius: 40px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .stat-value {
            font-weight: bold;
            color: #fbbf24;
        }

        /* Main Content Area */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar - Modules */
        .sidebar {
            width: 280px;
            background: #1e293b;
            overflow-y: auto;
            border-right: 1px solid #334155;
            padding: 1rem 0;
        }

        .module-item {
            padding: 0.8rem 1.2rem;
            margin: 0.3rem 0.8rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .module-item:hover {
            background: #334155;
        }

        .module-item.active {
            background: #fbbf24;
            color: #0f172a;
        }

        .module-item.completed {
            border-left: 4px solid #22c55e;
        }

        .module-icon {
            font-size: 1.3rem;
        }

        .module-info {
            flex: 1;
        }

        .module-title {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .module-status {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        /* Right Content Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #0f172a;
        }

        /* Module Content */
        .module-content {
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .lesson-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }

        h2 {
            color: #fbbf24;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        h3 {
            color: #94a3b8;
            margin: 1rem 0 0.5rem;
        }

        p {
            line-height: 1.6;
            margin-bottom: 1rem;
            color: #cbd5e1;
        }

        .code-block {
            background: #0f172a;
            padding: 1rem;
            border-radius: 12px;
            border-left: 4px solid #fbbf24;
            font-family: 'Courier New', monospace;
            margin: 1rem 0;
            overflow-x: auto;
        }

        .sql-example {
            color: #86efac;
        }

        /* Interactive SQL Editor */
        .sql-editor-section {
            background: #1e293b;
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            border: 2px solid #334155;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: #86efac;
            font-family: 'Courier New', monospace;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            resize: vertical;
        }

        .run-btn {
            background: #fbbf24;
            color: #0f172a;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .run-btn:hover {
            background: #f59e0b;
            transform: translateY(-2px);
        }

        .output-area {
            background: #0f172a;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
        }

        /* Quiz Section */
        .quiz-section {
            background: #1e293b;
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .quiz-question {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #0f172a;
            border-radius: 12px;
        }

        .quiz-option {
            margin: 0.5rem 0;
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .quiz-option:hover {
            background: #334155;
        }

        .quiz-option input {
            margin-right: 0.8rem;
            cursor: pointer;
        }

        .submit-quiz {
            background: #22c55e;
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }

        .quiz-feedback {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 8px;
            font-weight: bold;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            gap: 1rem;
        }

        .nav-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: #fbbf24;
            color: #0f172a;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Badges */
        .badge {
            background: #22c55e;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
            .module-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo">
            <h1>🎓 S.U.D <span>Structured University of Databases</span></h1>
        </div>
        <div class="progress-stats">
            <div class="stat">📚 <span class="stat-value" id="completedModules">0</span>/<span id="totalModules">7</span> Modules</div>
            <div class="stat">⭐ <span class="stat-value" id="totalPoints">0</span> Points</div>
        </div>
    </div>

    <div class="main-content">
        <div class="sidebar" id="sidebar">
            <!-- Modules will be dynamically populated -->
        </div>

        <div class="content-area" id="contentArea">
            <!-- Dynamic content loads here -->
        </div>
    </div>
</div>

<script>
    // Complete Course Data with 7 Modules
    const courseData = {
        modules: [
            {
                id: 1,
                title: "Module 1: SQL Fundamentals",
                icon: "🎯",
                completed: false,
                points: 100,
                content: {
                    lessons: [
                        "<h2>🎯 What is SQL?</h2><p>SQL (Structured Query Language) is the standard language for relational database management. It allows you to communicate with databases to retrieve, insert, update, and delete data.</p>",
                        "<h3>📝 Basic SELECT Statement</h3><p>The SELECT statement is used to retrieve data from a database. Basic syntax:</p><div class='code-block'><code class='sql-example'>SELECT column1, column2 FROM table_name;<br>SELECT * FROM table_name; -- Selects all columns</code></div>"
                    ],
                    exercises: [
                        {
                            type: "sql",
                            description: "Write a query to select all columns from a table called 'students'",
                            solution: "SELECT * FROM students;",
                            hint: "Use the asterisk (*) to select all columns"
                        }
                    ],
                    quiz: {
                        question: "What does SQL stand for?",
                        options: ["Structured Query Language", "Simple Question Language", "Standard Query Logic", "System Query Language"],
                        correct: 0,
                        explanation: "SQL stands for Structured Query Language, used to communicate with databases."
                    }
                }
            },
            {
                id: 2,
                title: "Module 2: Filtering Data",
                icon: "🔍",
                completed: false,
                points: 100,
                content: {
                    lessons: [
                        "<h2>🔍 WHERE Clause</h2><p>The WHERE clause filters records based on specific conditions.</p><div class='code-block'><code class='sql-example'>SELECT * FROM students WHERE age > 18;<br>SELECT name FROM students WHERE graduation_year = 2024;</code></div>",
                        "<h3>📊 Comparison Operators</h3><p>=, >, <, >=, <=, <> (not equal)</p>"
                    ],
                    exercises: [
                        {
                            type: "sql",
                            description: "Write a query to select all students whose age is greater than 20 from a table called 'students'",
                            solution: "SELECT * FROM students WHERE age > 20;",
                            hint: "Use WHERE clause with the > operator"
                        }
                    ],
                    quiz: {
                        question: "Which operator is used to filter records WHERE age is greater than 25?",
                        options: ["age < 25", "age = 25", "age > 25", "age <= 25"],
                        correct: 2,
                        explanation: "The > operator means 'greater than'"
                    }
                }
            },
            {
                id: 3,
                title: "Module 3: Sorting & Limiting",
                icon: "📊",
                completed: false,
                points: 100,
                content: {
                    lessons: [
                        "<h2>📊 ORDER BY & LIMIT</h2><p>Sort results using ORDER BY and limit results using LIMIT.</p><div class='code-block'><code class='sql-example'>SELECT * FROM students ORDER BY name ASC;<br>SELECT * FROM students LIMIT 5;<br>SELECT * FROM students ORDER BY graduation_year DESC LIMIT 10;</code></div>"
                    ],
                    exercises: [
                        {
                            type: "sql",
                            description: "Write a query to select all students ordered by name in ascending order",
                            solution: "SELECT * FROM students ORDER BY name ASC;",
                            hint: "Use ORDER BY with ASC keyword"
                        }
                    ],
                    quiz: {
                        question: "How do you sort results in descending order?",
                        options: ["ORDER BY column ASC", "ORDER BY column DESC", "SORT BY column", "ORDER column DESC"],
                        correct: 1,
                        explanation: "DESC keyword sorts in descending order"
                    }
                }
            },
            {
                id: 4,
                title: "Module 4: Inserting Data",
                icon: "✏️",
                completed: false,
                points: 100,
                content: {
                    lessons: [
                        "<h2>✏️ INSERT Statement</h2><p>Add new records to a table using INSERT INTO.</p><div class='code-block'><code class='sql-example'>INSERT INTO students (name, age, graduation_year) VALUES ('John Doe', 22, 2025);</code></div>"
                    ],
                    exercises: [
                        {
                            type: "sql",
                            description: "Write a query to insert a new student named 'Alice Brown', age 21, graduation year 2026",
                            solution: "INSERT INTO students (name, age, graduation_year) VALUES ('Alice Brown', 21, 2026);",
                            hint: "Use INSERT INTO with VALUES"
                        }
                    ],
                    quiz: {
                        question: "Which SQL statement is used to add new data to a table?",
                        options: ["ADD RECORD", "INSERT INTO", "ADD NEW", "CREATE RECORD"],
                        correct: 1,
                        explanation: "INSERT INTO is used to add new records"
                    }
                }
            },
            {
                id: 5,
                title: "Module 5: Updating Data",
                icon: "🔄",
                completed: false,
                points: 100,
                content: {
                    lessons: [
                        "<h2>🔄 UPDATE Statement</h2><p>Modify existing records using UPDATE.</p><div class='code-block'><code class='sql-example'>UPDATE students SET graduation_year = 2024 WHERE name = 'John Doe';<br>UPDATE students SET age = age + 1 WHERE graduation_year = 2025;</code></div><p><strong>Warning:</strong> Always use WHERE with UPDATE, otherwise ALL records will be updated!</p>"
                    ],
                    exercises: [
                        {
                            type: "sql",
                            description: "Write a query to update the graduation year to 2025 for the student named 'Alice Brown'",
                            solution: "UPDATE students SET graduation_year = 2025 WHERE name = 'Alice Brown';",
                            hint: "Use UPDATE with SET and WHERE"
                        }
                    ],
                    quiz: {
                        question: "What happens if you forget the WHERE clause in an UPDATE statement?",
                        options: ["Nothing happens", "Error occurs", "All records are updated", "Only first record updates"],
                        correct: 2,
                        explanation: "Without WHERE, ALL rows in the table are updated!"
                    }
                }
            },
            {
                id: 6,
                title: "Module 6: JOINs",
                icon: "🔗",
                completed: false,
                points: 100,
                content: {
                    lessons: [
                        "<h2>🔗 INNER JOIN</h2><p>JOIN combines rows from two or more tables based on a related column.</p><div class='code-block'><code class='sql-example'>SELECT students.name, courses.course_name<br>FROM students<br>INNER JOIN enrollments ON students.id = enrollments.student_id<br>INNER JOIN courses ON enrollments.course_id = courses.id;</code></div>",
                        "<h3>Types of JOINs:</h3><p>• INNER JOIN: Returns records with matching values in both tables<br>• LEFT JOIN: Returns all records from left table, matched from right<br>• RIGHT JOIN: Returns all records from right table, matched from left</p>"
                    ],
                    exercises: [
                        {
                            type: "sql",
                            description: "Write a query using INNER JOIN to get student names and their course names",
                            solution: "SELECT students.name, courses.course_name FROM students INNER JOIN enrollments ON students.id = enrollments.student_id INNER JOIN courses ON enrollments.course_id = courses.id;",
                            hint: "You need to join three tables"
                        }
                    ],
                    quiz: {
                        question: "Which JOIN returns all records from the left table even if there are no matches?",
                        options: ["INNER JOIN", "RIGHT JOIN", "LEFT JOIN", "FULL JOIN"],
                        correct: 2,
                        explanation: "LEFT JOIN returns all records from the left table"
                    }
                }
            },
            {
                id: 7,
                title: "Module 7: Aggregation",
                icon: "📈",
                completed: false,
                points: 100,
                content: {
                    lessons: [
                        "<h2>📈 Aggregate Functions</h2><p>Perform calculations on data: COUNT, SUM, AVG, MIN, MAX, GROUP BY.</p><div class='code-block'><code class='sql-example'>SELECT COUNT(*) as total_students FROM students;<br>SELECT AVG(age) as average_age FROM students;<br>SELECT graduation_year, COUNT(*) FROM students GROUP BY graduation_year;</code></div>"
                    ],
                    exercises: [
                        {
                            type: "sql",
                            description: "Write a query to count how many students are in each graduation year",
                            solution: "SELECT graduation_year, COUNT(*) FROM students GROUP BY graduation_year;",
                            hint: "Use GROUP BY with COUNT"
                        }
                    ],
                    quiz: {
                        question: "Which aggregate function would you use to find the oldest student?",
                        options: ["COUNT()", "AVG()", "MAX()", "SUM()"],
                        correct: 2,
                        explanation: "MAX() returns the maximum value"
                    }
                }
            }
        ]
    };

    let currentModule = 1;
    let moduleAnswers = {};
    let totalPoints = 0;

    // Initialize from localStorage if available
    function loadProgress() {
        const saved = localStorage.getItem('sudCourseProgress');
        if (saved) {
            const data = JSON.parse(saved);
            totalPoints = data.totalPoints || 0;
            moduleAnswers = data.moduleAnswers || {};
            courseData.modules.forEach((mod, idx) => {
                mod.completed = data.completedModules && data.completedModules[mod.id] || false;
            });
        }
        updateStats();
    }

    function saveProgress() {
        const completedModules = {};
        courseData.modules.forEach(mod => {
            completedModules[mod.id] = mod.completed;
        });
        localStorage.setItem('sudCourseProgress', JSON.stringify({
            totalPoints: totalPoints,
            moduleAnswers: moduleAnswers,
            completedModules: completedModules
        }));
    }

    function updateStats() {
        const completed = courseData.modules.filter(m => m.completed).length;
        document.getElementById('completedModules').textContent = completed;
        document.getElementById('totalPoints').textContent = totalPoints;
    }

    function renderSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = courseData.modules.map(module => `
            <div class="module-item ${currentModule === module.id ? 'active' : ''} ${module.completed ? 'completed' : ''}" onclick="loadModule(${module.id})">
                <div class="module-icon">${module.icon}</div>
                <div class="module-info">
                    <div class="module-title">${module.title}</div>
                    <div class="module-status">${module.completed ? '✓ Completed' : `${module.points} points`}</div>
                </div>
                ${module.completed ? '<span class="badge">✓</span>' : ''}
            </div>
        `).join('');
    }

    function checkQuiz(moduleId, questionIndex) {
        const module = courseData.modules.find(m => m.id === moduleId);
        if (!module || module.completed) return;

        const selected = document.querySelector(`input[name="quiz_${moduleId}"]:checked`);
        if (!selected) {
            alert('Please select an answer!');
            return;
        }

        const isCorrect = parseInt(selected.value) === module.content.quiz.correct;
        const feedbackDiv = document.getElementById(`quiz-feedback-${moduleId}`);
        
        if (isCorrect) {
            feedbackDiv.innerHTML = `<div class="quiz-feedback" style="background:#22c55e20; border-left:4px solid #22c55e;">✅ Correct! ${module.content.quiz.explanation}</div>`;
            if (!module.completed) {
                module.completed = true;
                totalPoints += module.points;
                updateStats();
                saveProgress();
                renderSidebar();
                // Show celebration
                setTimeout(() => {
                    alert(`🎉 Congratulations! You completed ${module.title} and earned ${module.points} points!`);
                }, 100);
            }
        } else {
            const correctAnswer = module.content.quiz.options[module.content.quiz.correct];
            feedbackDiv.innerHTML = `<div class="quiz-feedback" style="background:#ef444420; border-left:4px solid #ef4444;">❌ Incorrect. The correct answer is: ${correctAnswer}. ${module.content.quiz.explanation}</div>`;
        }
    }

    function runSQL(moduleId) {
        const sqlInput = document.getElementById(`sql-input-${moduleId}`).value.trim();
        const outputDiv = document.getElementById(`sql-output-${moduleId}`);
        const module = courseData.modules.find(m => m.id === moduleId);
        
        if (!sqlInput) {
            outputDiv.innerHTML = '<span style="color:#f87171;">⚠️ Please enter a SQL query first!</span>';
            return;
        }

        // Simple validation for exercise solutions
        const exercise = module.content.exercises[0];
        const expectedSolution = exercise.solution.toLowerCase().replace(/\s+/g, ' ');
        const userSolution = sqlInput.toLowerCase().replace(/\s+/g, ' ');
        
        if (userSolution.includes(expectedSolution) || expectedSolution.includes(userSolution) || 
            (userSolution.includes('select * from students') && moduleId === 1) ||
            (userSolution.includes('where age > 20') && moduleId === 2) ||
            (userSolution.includes('order by name asc') && moduleId === 3) ||
            (userSolution.includes("insert into students") && moduleId === 4) ||
            (userSolution.includes("update students set") && moduleId === 5) ||
            (userSolution.includes("inner join") && moduleId === 6) ||
            (userSolution.includes("group by") && moduleId === 7)) {
            
            outputDiv.innerHTML = `<span style="color:#86efac;">✅ Correct! ${module.content.exercises[0].description}<br>Your query: ${sqlInput}<br><br>💡 Great job! You've mastered this concept.</span>`;
            
            // Auto-mark exercise as completed for this session
            if (!moduleAnswers[`exercise_${moduleId}`]) {
                moduleAnswers[`exercise_${moduleId}`] = true;
                saveProgress();
            }
        } else {
            outputDiv.innerHTML = `<span style="color:#fbbf24;">💡 Hint: ${module.content.exercises[0].hint}<br><br>Your query: ${sqlInput}<br>Expected pattern: ${exercise.solution}</span>`;
        }
    }

    function loadModule(moduleId) {
        currentModule = moduleId;
        const module = courseData.modules.find(m => m.id === moduleId);
        const contentArea = document.getElementById('contentArea');
        
        const lessonsHtml = module.content.lessons.join('');
        
        const quizHtml = `
            <div class="quiz-section">
                <h3>📝 Quiz: Test Your Knowledge</h3>
                <div class="quiz-question">
                    <p><strong>${module.content.quiz.question}</strong></p>
                    ${module.content.quiz.options.map((opt, idx) => `
                        <div class="quiz-option">
                            <label>
                                <input type="radio" name="quiz_${moduleId}" value="${idx}">
                                ${opt}
                            </label>
                        </div>
                    `).join('')}
                    <button class="submit-quiz" onclick="checkQuiz(${moduleId}, 0)">Submit Answer</button>
                    <div id="quiz-feedback-${moduleId}"></div>
                </div>
            </div>
        `;
        
        const sqlEditorHtml = `
            <div class="sql-editor-section">
                <div class="editor-header">
                    <h3>💻 Interactive SQL Practice</h3>
                    <button class="run-btn" onclick="runSQL(${moduleId})">▶ Run Query</button>
                </div>
                <p><strong>Challenge:</strong> ${module.content.exercises[0].description}</p>
                <textarea id="sql-input-${moduleId}" rows="4" placeholder="Write your SQL query here..."></textarea>
                <div class="output-area" id="sql-output-${moduleId}">
                    💡 Your query results will appear here...
                </div>
            </div>
        `;
        
        const navHtml = `
            <div class="nav-buttons">
                <button class="nav-btn" ${moduleId === 1 ? 'disabled' : ''} onclick="loadModule(${moduleId - 1})">◀ Previous Module</button>
                <button class="nav-btn" ${moduleId === 7 ? 'disabled' : ''} onclick="loadModule(${moduleId + 1})">Next Module ▶</button>
            </div>
        `;
        
        contentArea.innerHTML = `
            <div class="module-content">
                ${lessonsHtml}
                ${sqlEditorHtml}
                ${quizHtml}
                ${navHtml}
            </div>
        `;
        
        renderSidebar();
        
        // Scroll to top
        document.getElementById('contentArea').scrollTop = 0;
    }

    // Initialize
    loadProgress();
    renderSidebar();
    loadModule(1);
    
    // Make functions global
    window.loadModule = loadModule;
    window.checkQuiz = checkQuiz;
    window.runSQL = runSQL;
</script>
</body>
</html>
